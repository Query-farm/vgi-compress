#
# Build the `compress-worker` binary for every supported platform and attach the
# archives (+ SHA256 + keyless cosign signature + SLSA provenance) to the GitHub
# Release for a vX.Y.Z tag. The heavy lifting lives in the shared reusable
# workflow Query-farm/vgi-actions/.github/workflows/rust-release.yml; this file
# gates on the repo's own CI suite and supplies the worker-specific inputs.
#
# Assets are named vgi-compress-<tag>-<duckdb_platform>.tar.gz (linux_amd64,
# linux_arm64, osx_amd64, osx_arm64, windows_amd64). The executable inside each
# archive is `compress-worker`, used directly as a DuckDB vgi LOCATION:
#   ATTACH 'compress' (TYPE vgi, LOCATION '/path/to/compress-worker');
#
# Release flow:
#   1. Bump [workspace.package] version in Cargo.toml; sync Cargo.lock.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
name: Release binaries

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Gate the release on the same unit + SQLLogic e2e suite as push/PR.
  # ci.yml's `audit` job requests `checks: write` (rustsec/audit-check posts a
  # check-run). A reusable workflow can never request a permission its CALLER
  # job did not grant, so this job must grant `checks: write` (plus the
  # `contents: read` the build jobs use) or the whole release run fails to start
  # with a startup_failure. On a direct push/PR the workflow-level default token
  # already carries these, which is why this only bites via `uses:`.
  ci:
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/ci.yml

  release:
    needs: [ci]
    permissions:
      contents: write     # create Release + upload assets
      id-token: write     # keyless cosign sign-blob + provenance (sigstore OIDC)
      attestations: write # SLSA build-provenance attestation
    uses: Query-farm/vgi-actions/.github/workflows/rust-release.yml@v1
    secrets: inherit
    with:
      bin: compress-worker
      asset_prefix: vgi-compress
      version_check_cmd: ci/check-version.sh
